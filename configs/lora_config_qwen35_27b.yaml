# Qwen 3.5 27B dense + linear-attention hybrid, QLoRA fine-tuning for Newgenes
# Architecture: 64 transformer layers, 3 linear_attn + 1 full_attn (full_attention_interval=4)
# Training target: M5 Max 64GB with iogpu.wired_limit_mb=57344 (56 GB Metal budget).
# Deployment target: Jetson Orin NX 16GB via Q3_K_M GGUF.
model: "/Users/arlo/models/Qwen3.5-27B-4bit"
train: true
data: "./mlx_data"
seed: 42
# 64 total layers; 16 targets the last 16 (captures last 4 full-attn + 12 linear-attn blocks).
lora_layers: 16
lora_parameters:
  rank: 8
  alpha: 16
  dropout: 0.05
  scale: 10.0
learning_rate: 1.0e-5
batch_size: 1
# Dense 27B is ~6-7x forward compute vs Gemma 4B-active.
# GatedDeltaNet no-kernel training path adds ~1.5x slowdown.
# 2500 iters on 1419 rows ≈ 1.76 epochs; rank 16 compensates for fewer epochs.
iters: 2500
val_batches: 25
steps_per_report: 20
steps_per_eval: 200
adapter_path: "./adapters/qwen35-27b-newgenes"
save_every: 250
# Token analysis: median=1099, p95=2188, p99=2930, max=5385.
# OOM at seq=2048 even with 56GB Metal budget — GatedDeltaNet fallback scratch buffers.
# 1024 covers ~45% fully; longer get truncated. Kept rank 16 + lora_layers 16 for quality.
max_seq_length: 1024
grad_checkpoint: true
